[defaults]
examplecount = 10
# minlen 4 statt 5: haeufige 4-Buchstaben-Vornamen/Orte (Anna, Emma, Paul, Bonn, Kiel)
# wurden mit minlen=5 nie gefunden. Bei zu vielen False Positives auf 5 erhoehen.
minlen = 4
critical = 5
anon = true
excelanon = true
# Finding 3: Klartext sensibler Werte nur mit --show-sensitive-values
show_sensitive_values = false
full = false
nocolor = false
showskipped = false

## Mögliche Anonmuster
# anon_muster = sss**sss**sss**
# anon_muster = ssss****ss**
# anon_muster = <redacted>
anon_muster = sss**sss**sss**

#Suchmuster aktivieren
search_feld = on
search_regexp = on
search_suchmuster = on

# Fortschrittsanzeige (Sekunden zwischen Updates, 0 = deaktiviert)
refresh_status = 5

# JSON-Parsing in Logs (true = JSON-Fragmente erkennen, false = schneller)
parse_json = false

# Parallele Worker (0 = auto/cpu_count, 1 = single-process)
workers = 1

# Pre-Filter (off = kein Filter, regexp_field = nur regexp+field, all = alles)
# ACHTUNG: Die Marker-Liste deckt nur einen Teil der Feld-/Regexp-Muster ab.
# Seit v1.6.0 passieren Zeilen mit >=5 zusammenhaengenden Ziffern immer den
# Filter (numerische PII wie VSNR/KVNR/IBAN). Fuer maximale Erkennungsrate
# prefilter = off lassen; all/regexp_field nur fuer sehr grosse Datenmengen.
prefilter = off

# Max. Beispielzeilen pro gefundenem Wert (Speicheroptimierung)
max_examples = 100

# Laufzeit-Schutz gegen Regex-DoS (Finding 1). Timeout pro Match in ms;
# ein Muster, das regex_disable_threshold-mal ausloest, wird fuer den Rest
# des Scans deaktiviert. Benoetigt das Paket 'regex'.
regex_timeout_ms = 100
regex_disable_threshold = 5

[files]
regexp = regexp.csv
field = field.csv
suchmuster = suchmuster.csv
suchmuster_verzeichnis = suchmuster
stopword_regexp = stopword_regexp.txt
stopword_field = stopword_field.txt
stopword_suchmuster = stopword_suchmuster.txt

